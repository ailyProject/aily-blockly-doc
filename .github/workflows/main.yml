name: CI&&CD

on:
  push:
    branches:
      - deploy

jobs:
  build-cn:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.21.1
        uses: actions/setup-node@v6
        with:
          node-version: '22.21.1'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: node process.js

      - name: Install deploy dependency
        run: npm install --no-save ssh2-sftp-client

      - name: Deploy To CN
        env:
          SFTP_HOST: ${{ secrets.CN_HOST }}
          SFTP_USERNAME: ${{ secrets.CN_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.CN_PASSWORD }}
          SFTP_TARGET: ${{ secrets.CN_TARGET }}
        run: |
          node <<'NODE'
          const fs = require('fs/promises');
          const path = require('path');
          const Client = require('ssh2-sftp-client');

          const folders = ['docs', 'docs_en', 'docs_zh_hk', 'docs_ja'];
          const targetRoot = process.env.SFTP_TARGET.replace(/\/+$/, '');
          const sftp = new Client();

          async function uploadDirectory(localRoot, remoteRoot) {
            let count = 0;
            await sftp.mkdir(remoteRoot, true);

            async function walk(localDir, remoteDir) {
              const entries = await fs.readdir(localDir, { withFileTypes: true });
              await sftp.mkdir(remoteDir, true);

              for (const entry of entries) {
                const localPath = path.join(localDir, entry.name);
                const remotePath = `${remoteDir}/${entry.name}`;

                if (entry.isDirectory()) {
                  await walk(localPath, remotePath);
                } else if (entry.isFile()) {
                  await sftp.fastPut(localPath, remotePath);
                  count += 1;
                }
              }
            }

            await walk(localRoot, remoteRoot);
            return count;
          }

          (async () => {
            await sftp.connect({
              host: process.env.SFTP_HOST,
              username: process.env.SFTP_USERNAME,
              password: process.env.SFTP_PASSWORD,
            });

            try {
              for (const folder of folders) {
                const count = await uploadDirectory(folder, `${targetRoot}/${folder}`);
                if (count === 0) {
                  throw new Error(`${folder} has no local files to upload`);
                }
                console.log(`Uploaded ${count} files from ${folder}`);
              }
            } finally {
              await sftp.end();
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

